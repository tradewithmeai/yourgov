name: iOS Release

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'simulator'
        type: choice
        options:
          - simulator
          - testflight

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS (${{ inputs.build_type || 'simulator' }})
    runs-on: macos-14  # Apple Silicon runner, Xcode 15.x

    env:
      PROJECT:    ios-mygov/MyGov.xcodeproj
      SCHEME: YourGov
      BUNDLE_ID:  uk.mygov.mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios-mygov && xcodegen generate

      # ── Simulator build (no signing needed) ──────────────────────
      - name: Build (simulator)
        if: inputs.build_type != 'testflight'
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme  "${{ env.SCHEME }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build/sim \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify

      - name: Package simulator build
        if: inputs.build_type != 'testflight'
        run: |
          APP=$(find build/sim -name "*.app" -type d | head -1)
          mkdir -p dist
          ditto -c -k --keepParent "$APP" dist/MyGov-iOS-simulator.zip

      # ── Signed build for TestFlight / App Store ───────────────────
      - name: Install Apple signing certificate
        if: inputs.build_type == 'testflight'
        env:
          P12_BASE64:       ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD:     ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/mygov.keychain-db
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: inputs.build_type == 'testflight'
        env:
          PP_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PP_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i "$PP_PATH" | \
            plutil -extract UUID raw -)
          cp "$PP_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Archive (TestFlight)
        if: inputs.build_type == 'testflight'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme  "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MyGov.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            archive | xcbeautify

      - name: Export IPA
        if: inputs.build_type == 'testflight'
        run: |
          cat > $RUNNER_TEMP/export.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/MyGov.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath dist/
          mkdir -p dist

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ github.run_number }}
          path: build/**/*.log
          retention-days: 14

      - name: Upload simulator artifact
        if: inputs.build_type != 'testflight'
        uses: actions/upload-artifact@v4
        with:
          name: MyGov-iOS-simulator-${{ github.run_number }}
          path: dist/MyGov-iOS-simulator.zip
          retention-days: 30

      - name: Upload IPA artifact
        if: inputs.build_type == 'testflight'
        uses: actions/upload-artifact@v4
        with:
          name: MyGov-iOS-ipa-${{ github.run_number }}
          path: dist/*.ipa
          retention-days: 30

      # ── TestFlight upload ─────────────────────────────────────────
      - name: Upload to TestFlight
        if: inputs.build_type == 'testflight' && startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_API_KEY_ID:       ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID:    ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_CONTENT:  ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          IPA=$(find dist -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey  "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --private-key-path "$KEY_PATH"

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          name: "YourGov iOS ${{ github.ref_name }}"
