name: Android Release

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android release
    runs-on: ubuntu-latest

    env:
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin_jdk/17.0/x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-mygov/**/*.gradle*', 'android-mygov/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android-mygov/gradlew

      # ── Decode keystore ───────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode \
            > android-mygov/app/mygov-release.jks

      # ── Build AAB (Play Store) ────────────────────────────────────
      - name: Build release AAB
        working-directory: android-mygov
        env:
          KEYSTORE_PATH:     app/mygov-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      # ── Build APK (QA sideload) ───────────────────────────────────
      - name: Build release APK
        working-directory: android-mygov
        env:
          KEYSTORE_PATH:     app/mygov-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      # ── Secure clean-up of keystore ───────────────────────────────
      - name: Remove keystore from workspace
        if: always()
        run: rm -f android-mygov/app/mygov-release.jks

      # ── Collect artifacts ─────────────────────────────────────────
      - name: Collect build outputs
        run: |
          mkdir -p dist
          AAB=$(find android-mygov/app/build/outputs/bundle/release \
                -name "*.aab" | head -1)
          APK=$(find android-mygov/app/build/outputs/apk/release \
                -name "*.apk" | head -1)
          cp "$AAB" dist/MyGov-release.aab
          cp "$APK" dist/MyGov-release.apk
          sha256sum dist/* > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGov-Android-AAB-${{ github.run_number }}
          path: dist/MyGov-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGov-Android-APK-${{ github.run_number }}
          path: dist/MyGov-release.apk
          retention-days: 30

      # ── Upload to Google Play ─────────────────────────────────────
      - name: Upload to Google Play
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: uk.mygov.mobile
          releaseFiles: dist/MyGov-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          releaseName: "${{ github.ref_name }}"

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/MyGov-release.aab
            dist/MyGov-release.apk
            dist/SHA256SUMS.txt
          generate_release_notes: true
          name: "MyGov Android ${{ github.ref_name }}"
