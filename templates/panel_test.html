<!DOCTYPE html>
<html lang="{{ active_locale }}" dir="{{ active_dir }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourGov</title>
<link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
<!-- Theme fonts (preconnect + lazy stylesheet) so the Quiet + Editorial
     themes have their faces ready when the user switches. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Source+Serif+Pro:wght@600;700&display=swap" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/static/panel_test.css{% if asset_version %}?v={{ asset_version }}{% endif %}">
<script>
  // Apply persisted theme BEFORE the page paints so there's no flash.
  (function () {
    try {
      var saved = localStorage.getItem('yourgov:lensTheme') || 'theme-glass';
      var valid = { 'theme-glass': 1, 'theme-quiet': 1, 'theme-editorial': 1 };
      if (!valid[saved]) saved = 'theme-glass';
      document.documentElement.classList.add(saved);
    } catch (e) { document.documentElement.classList.add('theme-glass'); }
  })();
</script>
</head>
<body data-mobile-view="source"{% if default_source %} data-default-source="{{ default_source }}"{% endif %}>
<main class="lens-poc app-shell">
  <section class="map-pane" aria-label="YourGov visualisation">
    <div class="map-wrap">
      <iframe
        id="map-frame"
        src="/map/relay"
        title="UK constituency map visualisation"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      ></iframe>


      <!-- Concentric menu: rings 1 (Explain) + 2 (wedges) always visible.
           Centre is the S search trigger (replaces the old M button). -->
      <div id="service-menu" class="service-menu always-on" role="group" aria-label="Map service controls">
        <!-- Ring 2: quartered map-mode picker (Vote / Party / Gender / Rebel) -->
        <div class="service-action ring-2 is-shown" data-action="modes" role="radiogroup" aria-label="Map mode">
          <button type="button" id="topic-vote-split"   class="ring-wedge wedge-ne active" data-mode="vote-split"   title="Vote"   aria-label="Map mode: Vote split — show how each constituency's MP voted on the selected division" role="radio" aria-checked="true">
            <span class="wedge-label" aria-hidden="true">Vote</span>
          </button>
          <button type="button" id="topic-party-split"  class="ring-wedge wedge-se" data-mode="party-split"  title="Party"  aria-label="Map mode: Party split — colour each constituency by its current MP's party" role="radio" aria-checked="false">
            <span class="wedge-label" aria-hidden="true">Party</span>
          </button>
          <button type="button" id="topic-gender-split" class="ring-wedge wedge-sw" data-mode="gender-split" title="Gender" aria-label="Map mode: Gender split — colour each constituency by its current MP's gender" role="radio" aria-checked="false">
            <span class="wedge-label" aria-hidden="true">Gender</span>
          </button>
          <button type="button" id="topic-rebel-rate"   class="ring-wedge wedge-nw" data-mode="rebel-split"  title="Rebel"  aria-label="Map mode: Rebel split - colour each constituency by whether its MP voted against their party majority on the selected division" role="radio" aria-checked="false">
            <span class="wedge-label" aria-hidden="true">Rebel</span>
          </button>
        </div>

        <!-- Ring 1: Explain toggle. Always visible. A plain centred pill label
             replaces the former curved SVG band; #ring-1-text keeps the
             data-label-off/on hooks that setupServiceMenu syncs. -->
        <button type="button" class="service-action ring-1 is-shown" data-action="explain" title="Explain" aria-label="Toggle Explain Mode" aria-pressed="false">
          <span id="ring-1-text" class="ring-1-label" data-label-off="Explain" data-label-on="Exit Explain">Explain</span>
        </button>

        <!-- Outer nav ring (YourGov / Start / Global) removed: the globe view is
             disabled for live countries and the ring's S/Y/G navigation is now
             defunct. setupNavRing() in panel_test.js no-ops when #nav-ring is
             absent, so no JS change is needed. -->

        <!-- Centre "S" search widget: the only search on the page. The S
             glyph sits at the menu centre and expands the input on click.
             Wired by setupMapSearch(); same /api/mps/search backend. -->
        <div id="map-search" class="map-search is-collapsed" role="search" aria-label="Search MP or constituency">
          <button type="button" class="map-search-trigger service-menu-center" id="map-search-trigger" title="Search" aria-label="Search MP" aria-expanded="false">
            <span class="map-search-glyph" aria-hidden="true">S</span>
          </button>
          <form id="mp-search-form" class="map-search-form" autocomplete="off">
            <input
              id="mp-search-input"
              class="map-search-input"
              type="search"
              name="q"
              placeholder=""
              autocomplete="off"
              aria-autocomplete="inline"
              spellcheck="false"
              aria-label="Search MP or constituency"
              maxlength="48"
            >
          </form>
          <div id="search-results" class="search-results" hidden></div>
        </div>

      </div>

      <!-- Map title overlay -->
      <h1 class="map-title" data-explainable="true" data-explain-type="section" data-context="map-view">YourGov map</h1>

      <!-- Map legend strip: lives at the bottom of the left panel.
           Hidden by default; revealed by setLegend() on wedge press. -->
      <div id="map-legend" class="legend legend-strip" aria-label="Map legend" aria-live="polite" hidden></div>

      <!-- Theme picker: small ⚙ glass dot at the bottom corner of
           the map pane. Opens a popover with 3 theme cards. -->
      <div id="theme-picker" class="theme-picker">
        <button type="button" class="theme-picker-trigger" id="theme-picker-trigger"
                aria-label="Change theme" aria-haspopup="dialog" aria-expanded="false" title="Theme">
          <span aria-hidden="true">⚙</span>
        </button>
        <div class="theme-picker-popover" id="theme-picker-popover" role="dialog" aria-label="Theme picker" hidden>
          <p class="theme-picker-title">Theme</p>
          <button type="button" class="theme-card" data-theme="theme-glass">
            <span class="theme-swatch theme-swatch-glass" aria-hidden="true"></span>
            <span>
              <strong>Glass</strong>
              <em>Dark + cyan</em>
            </span>
          </button>
          <button type="button" class="theme-card" data-theme="theme-quiet">
            <span class="theme-swatch theme-swatch-quiet" aria-hidden="true"></span>
            <span>
              <strong>Quiet</strong>
              <em>Inter, less glass</em>
            </span>
          </button>
          <button type="button" class="theme-card" data-theme="theme-editorial">
            <span class="theme-swatch theme-swatch-editorial" aria-hidden="true"></span>
            <span>
              <strong>Editorial</strong>
              <em>Serif headings</em>
            </span>
          </button>
          <hr class="theme-picker-rule">
          <button type="button" class="theme-card theme-card-action" id="theme-replay-tour">
            <span class="theme-swatch theme-swatch-replay" aria-hidden="true">↻</span>
            <span><strong>Replay tour</strong><em>Show the 3-step intro again</em></span>
          </button>
        </div>
      </div>

      <!-- Selection-card removed: the map colouring + legend strip carry
           the meaning. Off-screen mirrors of its IDs keep legacy JS code
           paths (renderSelection, selectSearchMP, etc.) safe without
           rewriting every call site. -->
    </div>
  </section>

  <section class="source-pane yourgov-panel" id="yourgov-panel" aria-label="YourGov source controls">
    <!-- MP record: the MP panel (title) populated by the centre search,
         with the voting record listed directly underneath. -->
    <section class="source-detail-panel division-results-panel" aria-label="MP voting record">
      <!-- Frozen MP info card: pinned at the top of the panel (does not scroll
           with the voting record below). Populated by renderMPInfoCard on
           selection; hidden on first load while the intro shows in the list. -->
      <div id="mp-info-card" class="mp-info-card" aria-live="polite" hidden></div>
      <div id="source-lens-list" class="source-lens-list division-results" aria-live="polite">
        <p class="source-lens-loading">Use the search on the map to find your MP and see their voting record.</p>
      </div>
      <span id="source-status" class="source-status ok" aria-live="polite" role="status" hidden>Ready.</span>
    </section>

    <!-- YourGov division summary. Hidden until a division is double-clicked
         (or its "Open summary" action used). Overlays the record so it reads
         like opening a division page; Back returns to the list. This is the
         first-party replacement for the retired PublicWhip source frame. -->
    <div id="division-summary" class="division-summary" role="dialog" aria-label="Division summary" hidden>
      <div class="division-summary-bar">
        <button type="button" id="division-summary-close" class="division-summary-close" aria-label="Back to voting record">&larr; Back to voting record</button>
      </div>
      <div id="division-summary-body" class="division-summary-body" aria-live="polite"></div>
    </div>
  </section>
</main>

<!-- ── Mobile single-panel toolbar ──────────────────────────────
     Hidden above 900px (desktop split-view). On mobile, sticky at
     the bottom of the viewport, thumb-reachable. Source / Map are
     the two panel views; Visualise commits a pending visualise
     intent (and auto-switches to map); Explain toggles Explain Mode. -->
<nav class="mobile-toolbar" id="mobile-toolbar" role="toolbar" aria-label="YourGov panel switcher" hidden>
  <button type="button" class="mob-btn is-active" data-mobile-action="show-source" aria-pressed="true">
    <span class="mob-icon" aria-hidden="true">☰</span><span class="mob-label">Source</span>
  </button>
  <button type="button" class="mob-btn" data-mobile-action="show-map" aria-pressed="false">
    <span class="mob-icon" aria-hidden="true">▦</span><span class="mob-label">Map</span>
  </button>
  <button type="button" class="mob-btn" data-mobile-action="visualise"
          title="Show the selected source item on the map">
    <span class="mob-icon" aria-hidden="true">◉</span><span class="mob-label">Visualise</span>
  </button>
  <button type="button" class="mob-btn" data-mobile-action="explain" aria-pressed="false">
    <span class="mob-icon" aria-hidden="true">?</span><span class="mob-label">Explain</span>
  </button>
</nav>

<!-- Toast slot for mobile flow feedback ("Showing map for selected record."). -->
<div id="mobile-toast" class="mobile-toast" role="status" aria-live="polite" hidden></div>

<script src="/static/panel_test.js{% if asset_version %}?v={{ asset_version }}{% endif %}"></script>
<link rel="stylesheet" href="/static/explain-mode.css{% if asset_version %}?v={{ asset_version }}{% endif %}">
<script src="/static/explain-mode.js{% if asset_version %}?v={{ asset_version }}{% endif %}"></script>

<!-- ── Onboarding tour overlay ──────────────────────────────────
     Three-step coachmark sequence shown once per session.
     The .tour-step targets are resolved by class/id at runtime so
     the spotlight follows the source pane, map, and wedge ring. -->
<div id="tour-overlay" class="tour-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="tour-title" aria-describedby="tour-body">
  <div class="tour-backdrop" aria-hidden="true"></div>
  <div class="tour-spot" aria-hidden="true"></div>
  <div class="tour-card" role="document">
    <p class="tour-step-meta"><span id="tour-step-num">1</span> / 3</p>
    <h3 id="tour-title">{{ t('tour_step1_title') }}</h3>
    <p id="tour-body">{{ t('tour_step1_body') }}</p>
    <div class="tour-actions">
      <button type="button" id="tour-skip" class="tour-btn tour-btn-ghost">{{ t('tour_skip') }}</button>
      <button type="button" id="tour-next" class="tour-btn tour-btn-primary">{{ t('tour_next') }}</button>
    </div>
  </div>
</div>

<script>
// Bilingual tour copy passed to the tour module via a data island so we
// don't have to template the JS file.
(function () {
  // Copy order matches the STEPS array order in static/tour.js, in the natural
  // journey order: step 1 = find your MP (search), step 2 = read the record +
  // contact (source panel), step 3 = switch the map view (mode ring).
  window.__TOUR_COPY__ = {
    steps: [
      { title: {{ t('tour_step1_title')|tojson }}, body: {{ t('tour_step1_body')|tojson }} },
      { title: {{ t('tour_step2_title')|tojson }}, body: {{ t('tour_step2_body')|tojson }} },
      { title: {{ t('tour_step3_title')|tojson }}, body: {{ t('tour_step3_body')|tojson }} }
    ],
    next: {{ t('tour_next')|tojson }},
    done: {{ t('tour_done')|tojson }},
    skip: {{ t('tour_skip')|tojson }}
  };
})();
</script>
<script src="/static/tour.js{% if asset_version %}?v={{ asset_version }}{% endif %}"></script>
<script src="/static/theme-picker.js{% if asset_version %}?v={{ asset_version }}{% endif %}"></script>
<!-- Autopilot demo (hard-disabled by default; activates only with ?autopilot=1) -->
<link rel="stylesheet" href="/static/demo-flow.css{% if asset_version %}?v={{ asset_version }}{% endif %}">
<script src="/static/demo-flow.js{% if asset_version %}?v={{ asset_version }}{% endif %}"></script>
</body>
</html>
