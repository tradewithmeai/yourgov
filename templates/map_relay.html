<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourGov Map</title>
  <base href="/static/promap/">
  <script type="module" crossorigin src="{{ promap_js | default('/static/promap/assets/index-uJtvkwRy.js') }}"></script>
  <link rel="stylesheet" crossorigin href="{{ promap_css | default('/static/promap/assets/index-CvBPfDPn.css') }}">
  <style>
    html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    /* The map bundle includes demo controls + a developer placeholder panel
       (the top-right "Explore / Hover for names" card). We use our own left-hand
       panel for constituency/MP info, so hide the bundle's whole panel — hiding
       only its inner .mygov-panel-empty left the OUTER rounded box visible as an
       empty shell in the top-right corner. */
    .mygov-map-controls { display: none !important; }
    .mygov-constituency-panel { display: none !important; }
    .mygov-panel-empty { display: none !important; }
    /* Hide the React bundle's own topbar / header chrome so the parent
       page's "How MPs voted" title sits directly on the map and the
       card snap-corners align with the visible map area, not with
       iframe chrome. */
    .mygov-map-topbar,
    .mygov-map-header,
    .mygov-map-shell > header,
    .mygov-map-shell > .header { display: none !important; }
    /* Critical: when embedded in an iframe, the map canvas can collapse to 0 height.
       Force the frame/canvas to fill the viewport. */
    .mygov-map-page, .mygov-map-shell { height: 100% !important; }
    .mygov-map-shell { display: flex !important; flex-direction: column !important; }
    .mygov-map-frame { flex: 1 1 auto !important; min-height: 0 !important; }
    .mygov-map-canvas { height: 100% !important; min-height: 420px !important; }
    /* Leaflet attribution: small + subtle. Reads if you go looking
       for it, doesn't compete with the viz. */
    .leaflet-control-attribution {
      font-size: 11px !important;
      line-height: 1.2 !important;
      padding: 2px 6px !important;
      opacity: 0.55 !important;
      background: transparent !important;
      color: #cbd5e1 !important;
    }
    .leaflet-control-attribution a {
      font-size: inherit !important;
      color: #94a3b8 !important;
    }
    .leaflet-control-attribution:hover { opacity: 1 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var _pendingSetMode = null;
    var _readySent = false;
    var _pollCount = 0;

    function _applySetMode(msg) {
      var api = window.mygovConstituencyMap;
      if (!api || typeof api.setConstituencyColours !== 'function') return false;
      var mode = String(msg.mode || '').toLowerCase();
      var data = msg.data || {};
      var applied = false;
      // The division-map payload carries an explicit per-constituency `color`, and the
      // promap bundle's 'votes' resolver reads that colour directly. So every
      // division-scoped mode — vote/party/gender/rebel, in both the legacy ('votes',
      // 'party', ...) and current ('vote-split', 'party-split', ...) naming — renders
      // through the bundle's 'votes' channel. Without the *-split branches the map
      // silently ignored every division click while still reporting success.
      if (
        mode === 'votes' || mode === 'vote' || mode === 'vote-split' ||
        mode === 'highlight' ||
        mode === 'party' || mode === 'party-split' ||
        mode === 'gender' || mode === 'gender-split' ||
        mode === 'rebel-rate' || mode === 'rebel-split'
      ) {
        api.setConstituencyColours('votes', data);
        applied = true;
      } else if (mode === 'constituency') {
        api.setConstituencyColours('none', {});
        applied = true;
      } else if (mode === 'issue') {
        api.setConstituencyColours('issue', data);
        applied = true;
      } else if (mode === 'source-confidence') {
        api.setConstituencyColours('turnout', data);
        applied = true;
      } else if (data && typeof data === 'object' && Object.keys(data).length) {
        // Unknown mode but we were handed coloured rows — paint them rather than
        // dropping the update on the floor.
        api.setConstituencyColours('votes', data);
        applied = true;
      }
      // Only report success when a paint actually happened, so a dropped mode can
      // never masquerade as "Map updated".
      if (applied && window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'yourgov:map:applied' }, window.location.origin);
      }
      return applied;
    }

    function _notifyReadyOnce() {
      if (_readySent) return;
      _readySent = true;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'yourgov:map:ready' }, window.location.origin);
      }
    }

    function relaySelection(e) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'yourgov:constituency:selected', detail: e.detail }, window.location.origin);
      }
    }

    // NOTE: these two event names MUST stay 'mygov:' — they are dispatched by the
    // prebuilt promap bundle (CustomEvent("mygov:constituency:selected", …)), whose
    // source is in a separate project. The relay re-emits to the parent under the
    // yourgov: protocol above. Renaming these would silently break map selection.
    window.addEventListener('mygov:constituency:selected', relaySelection);
    window.addEventListener('mygov:constituency:sel', relaySelection);

    window.addEventListener('message', function (e) {
      if (e.origin !== window.location.origin || !e.data) return;
      var type = e.data.type;
      if (type === 'yourgov:map:ping') {
        // Parent is probing. If our API is up, re-emit :ready and flush
        // any buffered setMode. If not, the existing poll will emit
        // :ready once the API mounts.
        var api = window.mygovConstituencyMap;
        if (api && typeof api.setConstituencyColours === 'function') {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'yourgov:map:ready' }, window.location.origin);
          }
          _readySent = true;
          if (_pendingSetMode) {
            var pending = _pendingSetMode;
            _pendingSetMode = null;
            _applySetMode(pending);
          }
        }
        return;
      }
      if (type !== 'yourgov:map:setMode') return;
      var api2 = window.mygovConstituencyMap;
      if (api2 && typeof api2.setConstituencyColours === 'function') {
        _applySetMode(e.data);
      } else {
        _pendingSetMode = e.data;
      }
    });

    // Poll until the promap React API mounts, then apply any buffered message.
    // Cap at 100 attempts (10s) to avoid infinite polling on mount failure.
    var _readyPoll = setInterval(function () {
      _pollCount++;
      var api = window.mygovConstituencyMap;
      if (api && typeof api.setConstituencyColours === 'function') {
        clearInterval(_readyPoll);
        _notifyReadyOnce();
        if (_pendingSetMode) {
          var msg = _pendingSetMode;
          _pendingSetMode = null;
          _applySetMode(msg);
        }
        return;
      }
      if (_pollCount >= 100) {
        clearInterval(_readyPoll);
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'yourgov:map:failed' }, window.location.origin);
        }
      }
    }, 100);
  </script>
</body>
</html>
